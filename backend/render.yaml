services:
  - type: web
    name: safepay-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:////var/data/upi_fraud.db
      - key: MODELS_DIR
        value: /var/data/models
    disk:
      name: safepay-data
      mountPath: /var/data
      sizeGB: 1
